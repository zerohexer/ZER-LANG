<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Apple-style Squircle Background -->
  <rect width="400" height="400" rx="88" fill="black"/>

  <!-- Safe Container (Brackets) -->
  <path d="M 150 130 H 120 V 270 H 150" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <path d="M 250 130 H 280 V 270 H 250" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>

  <!-- The Pointer (Minimalist Asterisk) -->
  <g transform="translate(200, 200)" stroke="white" stroke-width="10" stroke-linecap="round">
    <line y1="-35" y2="35" />
    <line transform="rotate(60)" y1="-35" y2="35" />
    <line transform="rotate(120)" y1="-35" y2="35" />
  </g>
</svg>
